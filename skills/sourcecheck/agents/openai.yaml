interface:
  display_name: "SourceCheck"
  short_description: "Checks whether draft claims are supported by provided sources"
  default_prompt: >-
    Use SourceCheck to build a claim ledger and classify each claim as supported,
    unsupported, or uncertain against the provided source text only. Use a
    narrower reason_code such as partial, misrepresented, source_mismatch,
    unretrievable, or needs_expert_review when useful.

policy:
  allow_implicit_invocation: false
